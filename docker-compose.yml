services:

  db:
    image: postgres:17-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - private

  backend:
    build: ./backend
    container_name: backend
    volumes:
      - ./backend:/backend
    environment:
      ENGINE: postgresql+asyncpg
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - public
      - private

  frontend:
    build: ./frontend
    container_name: frontend
    environment:
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - public

networks:
  private:
    driver: bridge
  public:
    driver: bridge
  
volumes:
  postgres_data:
